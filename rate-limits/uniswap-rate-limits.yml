specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Uniswap
providerId: uniswap
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Blockchain
  - DeFi
  - Subgraph
  - Rate Limiting
description: Uniswap does not publish a centralized API rate-limit policy because the protocol is
  on-chain. Subgraph queries flow through The Graph Network and inherit that platform's billing-driven
  throttling - usage above the 100K monthly free tier is charged rather than throttled. On-chain
  interactions are governed by Ethereum and L2 block-space limits, not application-layer rate limits.
  For production reliability, Uniswap recommends self-hosting subgraphs.
sources:
  - https://developers.uniswap.org/api/subgraph/overview
  - https://thegraph.com/docs/en/subgraphs/billing/
responseCodes:
  throttled: 429
limits:
  - name: The Graph free-tier subgraph queries
    scope: api-key
    metric: queries_per_month
    limit: 100000
    timeFrame: month
    notes: Provided by The Graph Network for any subgraph, including Uniswap subgraphs. Beyond the
      free tier, additional queries are billed at $2 per 100K rather than throttled.
  - name: On-chain interaction
    scope: account
    metric: varies
    limit: bounded by Ethereum / L2 block gas limit
    notes: No application-layer rate limit; throughput is constrained by network gas and block size.
policies:
  - name: Self-Host for Production
    description: Uniswap docs explicitly recommend deploying and managing your own subgraph using
      official repositories for production reliability rather than relying solely on shared public
      endpoints.
  - name: Pay-As-You-Go on The Graph
    description: Excess subgraph query volume is billed by The Graph rather than hard-throttled,
      assuming an active card or GRT balance is configured in The Graph Studio.
  - name: Decentralized Network
    description: Hosted subgraphs are deprecated; queries must go through The Graph's decentralized
      network using a Studio-issued API key.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
