specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Uniswap
providerId: uniswap
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Blockchain
  - DeFi
  - Decentralized Exchange
  - Subgraph
description: Uniswap itself does not operate a metered, pay-walled API. The Uniswap protocol is on-chain;
  data access is via Uniswap subgraphs published on The Graph Network. Querying those subgraphs uses
  The Graph's billing - 100,000 free queries per month, then $2 per additional 100,000 queries, paid
  by credit card or in GRT. Uniswap-published API documentation also recommends self-hosting subgraphs
  for production reliability. Trading interactions occur on-chain and consume Ethereum-network gas
  paid in ETH, not a Uniswap-charged fee.
sources:
  - https://developers.uniswap.org/api/subgraph/overview
  - https://thegraph.com/docs/en/subgraphs/billing/
  - https://thegraph.com/studio-pricing/
plans:
  - id: uniswap-subgraph-free
    name: Subgraph Queries (Free Tier via The Graph)
    type: freemium
    description: First 100,000 GraphQL queries per month against Uniswap subgraphs hosted on The
      Graph Network are free.
    entries:
      - label: Subgraph queries
        name: subgraph_queries
        type: quota
        metric: query
        limit: 100000
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: Uniswap v1, v2, v3, v4 Subgraphs
      - name: GraphQL Access
      - name: API Key via The Graph Studio
  - id: uniswap-subgraph-growth
    name: Subgraph Queries (Growth via The Graph)
    type: usage-based
    description: Pay-as-you-go beyond the free tier, billed by The Graph at $2 per 100,000 queries
      in USD or GRT.
    entries:
      - label: Subgraph queries
        name: subgraph_queries
        type: metered
        metric: query
        limit: -1
        timeFrame: month
        geo: global
        unit: 100000
        price: '$2 per 100,000 queries'
        userMultiplied: false
    elements:
      - name: Card Billing
      - name: GRT Billing on Arbitrum One
      - name: Studio API Key
  - id: uniswap-onchain
    name: On-Chain Trading and Liquidity
    type: usage-based
    description: Direct interaction with Uniswap protocol smart contracts. Uniswap charges no per-call
      fee; users pay Ethereum (or L2) network gas in the network's native token plus the protocol
      swap fee tier (e.g. 0.05%, 0.30%, 1.00%) which routes to liquidity providers, not Uniswap Labs.
    entries:
      - label: Network gas
        name: network_gas
        type: metered
        metric: gas
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: variable network gas paid in ETH or L2 gas token
        userMultiplied: false
      - label: Pool fee tier
        name: pool_fee
        type: metered
        metric: trade_volume
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.01% / 0.05% / 0.30% / 1.00% depending on pool tier'
        userMultiplied: false
    elements:
      - name: Permissionless Smart Contract Access
      - name: Multiple Fee Tiers
      - name: No Uniswap-Labs Per-Call Charge
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
