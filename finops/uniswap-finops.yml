specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Uniswap
providerId: uniswap
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Blockchain
  - DeFi
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for Uniswap consumers - on-chain trading cost is dominated by Ethereum
  / L2 gas plus pool fees that flow to liquidity providers, while data access cost is dominated by
  subgraph query usage billed through The Graph Network.
sources:
  - https://developers.uniswap.org/api/subgraph/overview
  - https://thegraph.com/docs/en/subgraphs/billing/
  - https://thegraph.com/studio-pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Uniswap Labs (protocol); The Graph (subgraph queries)
serviceCategory: DeFi / On-Chain Data
billingModel:
  pricingCategory: Pay-As-You-Go
  billingFrequency: Monthly (subgraph) + On-Demand (gas)
  billingCurrency: USD/ETH/GRT
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: Uniswap
  ServiceCategory: DeFi
  ProviderName: Uniswap
  PublisherName: Uniswap Labs
  InvoiceIssuerName: The Graph (subgraph queries); on-chain costs are paid in network gas
  BillingCurrency: USD
meters:
  - name: subgraph_queries
    description: GraphQL queries against Uniswap subgraphs on The Graph Network; billed at $2 per
      100K beyond the free tier.
    unit: query
    aggregation: sum
    dimensions:
      - subgraph
      - api_key
  - name: network_gas
    description: Gas consumed by on-chain Uniswap protocol interactions, paid in the underlying network's
      gas token.
    unit: gas
    aggregation: sum
    dimensions:
      - chain
      - tx_type
  - name: pool_fee_volume
    description: Notional swap volume passing through a Uniswap pool; pool fee tier (0.01% / 0.05%
      / 0.30% / 1.00%) determines LP payout.
    unit: trade_volume
    aggregation: sum
    dimensions:
      - chain
      - pool
      - fee_tier
principles:
  - name: Visibility
    description: Track subgraph query volume in The Graph Studio per API key; track on-chain gas
      and routing efficiency by indexing Uniswap router contract events per wallet or smart-account.
  - name: Allocation
    description: Issue separate Graph Studio API keys per consuming team, environment, or product
      to attribute subgraph spend; tag wallets/relayers used for on-chain calls so gas can be allocated
      per workload.
  - name: Optimization
    description: Cache subgraph results, prefer batched queries, and self-host high-volume subgraphs
      using the official repos to escape per-query pricing. For trading, route via UniswapX or auto-router
      to reduce gas and slippage; choose appropriate fee tier and L2 deployment for the trade size.
  - name: Accountability
    description: Set Graph Studio billing alerts ahead of monthly query budgets; for on-chain workloads
      assign wallet ownership and gas budgets per integration to detect runaway transactions.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
