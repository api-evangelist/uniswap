description: >-
  Uniswap is the world's leading decentralized exchange (DEX) protocol, enabling
  permissionless token swaps on Ethereum and 25+ EVM-compatible blockchains through
  automated market making (AMM). The Uniswap Labs Trading API provides REST endpoints
  for quotes, swap execution, gasless UniswapX orders, liquidity provider (LP) position
  management, and wallet operations. Developers can build trading bots, portfolio
  managers, DeFi aggregators, and embedded swap UIs on top of the protocol.
