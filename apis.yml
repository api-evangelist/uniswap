  - name: Uniswap Features
    type: Features
    data:
      - name: Token Swaps
        description: >-
          Swap any ERC-20 token on 25+ EVM chains with optimal routing across
          Uniswap v2, v3, and v4 liquidity pools.
      - name: Gasless UniswapX Orders
        description: >-
          Sign off-chain intent-based orders that are filled by competing fillers
          without requiring the swapper to pay gas fees directly.
      - name: Liquidity Provider Management
        description: >-
          Create, increase, decrease, and manage concentrated liquidity positions
          on Uniswap v3 and v4 with fee tier and tick range control.
      - name: Cross-Chain Bridging
        description: >-
          Bridge tokens across EVM networks using the unified quote and swap APIs
          with automatic routing to the best bridge provider.
      - name: Limit Orders
        description: >-
          Submit limit orders that execute automatically when market conditions
          meet the specified price target.
      - name: Smart Wallet Support
        description: >-
          Native support for EIP-7702 delegated accounts, ERC-4337 account
          abstraction, and EIP-5792 wallet capabilities.
      - name: Execution Plans
        description: >-
          Create multi-step execution plans for complex DeFi workflows with
          step proofs for verification and tracking.
      - name: On-Chain Data via Subgraphs
        description: >-
          Query historical and real-time on-chain data for pools, positions,
          swaps, and ticks via GraphQL subgraph endpoints.
  - name: Uniswap Use Cases
    type: UseCases
    data:
      - name: Token Swap Integration
        description: >-
          Embed token swap functionality in wallets, DApps, and portfolio
          managers using the Trading API's quote and swap endpoints.
      - name: DeFi Aggregator
        description: >-
          Build a DEX aggregator that routes through Uniswap's liquidity
          alongside other protocols for best execution.
      - name: Liquidity Mining Bot
        description: >-
          Automate LP position management — create, rebalance, and close
          positions based on market conditions using LP management endpoints.
      - name: On-Chain Analytics
        description: >-
          Power analytics dashboards with historical pool, swap, and liquidity
          data from the Subgraph GraphQL API.
      - name: Cross-Chain Bridge UI
        description: >-
          Build a bridge interface that quotes and executes cross-chain token
          transfers using the swap/bridge endpoints.
  - name: Uniswap Integrations
    type: Integrations
    data:
      - name: The Graph Protocol
        description: >-
          Uniswap subgraphs are indexed and served by The Graph Protocol's
          decentralized network.
      - name: Ethereum
        description: >-
          Primary deployment network for Uniswap v2, v3, and v4 smart contracts.
      - name: Polygon
        description: >-
          Uniswap v3 deployed on Polygon PoS and zkEVM networks.
      - name: Arbitrum
        description: >-
          Uniswap v3 deployed on Arbitrum One for low-cost swaps.
      - name: Optimism
        description: >-
          Uniswap v3 deployed on Optimism for low-cost swaps.
      - name: Base
        description: >-
          Uniswap v3 and v4 deployed on Base (Coinbase's L2 network).
      - name: UniswapX Fillers
        description: >-
          Third-party filler bots compete to fill UniswapX gasless orders for
          best execution.
