    description: >-
      The Uniswap Trading API provides REST endpoints for token swaps, bridges,
      liquidity management, and execution planning across 25+ blockchain networks.
      It supports swap quoting, gasless UniswapX orders, LP position management,
      wallet operations (EIP-7702, ERC-4337), and multi-step execution plans.
      Authentication requires an API key passed in the x-api-key header.
  - aid: uniswap:uniswap-subgraph-api
    name: Uniswap Subgraph API
    tags:
      - Blockchain
      - DeFi
      - GraphQL
      - On-Chain Data
    humanURL: https://developers.uniswap.org/api/overview
    properties:
      - url: https://developers.uniswap.org/api/overview
        type: Documentation
    description: >-
      The Uniswap Subgraph API provides GraphQL endpoints for querying on-chain
      data across Uniswap protocol versions v1, v2, v3, and v4. Powered by The
      Graph Protocol decentralized network, it supports queries for pools,
      positions, swaps, ticks, and historical data. Requires an API key from
      The Graph Studio.
  - aid: uniswap:uniswap-x-api
    name: UniswapX API
    tags:
      - Blockchain
      - DeFi
      - Gasless
      - Intent Orders
    humanURL: https://docs.uniswap.org/
    properties:
      - url: https://docs.uniswap.org/
        type: Documentation
    description: >-
      UniswapX is a gasless, auction-based ERC20 swap settlement protocol that
      routes orders through a competitive filler network. Swappers sign off-chain
      orders which are filled by fillers who compete to provide the best execution.
      The API supports order creation, retrieval, and status tracking.
