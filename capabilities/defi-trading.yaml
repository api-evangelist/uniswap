naftiko: 1.0.0-alpha2
info:
  label: Uniswap DeFi Trading
  description: Unified DeFi trading workflow for swap execution, gasless orders, liquidity management, and token discovery.
    Used by DeFi developers, trading bots, and portfolio managers building on the Uniswap protocol. Combines quote generation,
    swap execution, UniswapX gasless orders, LP position management, and execution planning into a single capability surface.
  tags:
  - Uniswap
  - DeFi
  - Blockchain
  - Swaps
  - Liquidity Provider
  - Trading
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    UNISWAP_API_KEY: UNISWAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: uniswap-trading
    baseUri: https://trade-api.gateway.uniswap.org/v1
    description: Uniswap Labs trading API for token swaps, bridging, and LP management.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{UNISWAP_API_KEY}}'
      placement: header
    resources:
    - name: approvals
      path: /check_approval
      description: Token approval management
      operations:
      - name: check-token-approval
        method: POST
        description: Check if token approval is required for a transaction
        inputParameters:
        - name: walletAddress
          in: body
          type: string
          required: true
          description: Ethereum address initiating the transaction
        - name: token
          in: body
          type: string
          required: true
          description: Token contract address
        - name: amount
          in: body
          type: string
          required: true
          description: Token amount in base units
        - name: chainId
          in: body
          type: integer
          required: false
          description: 'Blockchain chain ID (default: 1 for Ethereum)'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: quotes
      path: /quote
      description: Swap quote generation
      operations:
      - name: get-swap-quote
        method: POST
        description: Get a quote for a swap, bridge, or wrap/unwrap
        inputParameters:
        - name: type
          in: body
          type: string
          required: true
          description: 'Quote type: EXACT_INPUT or EXACT_OUTPUT'
        - name: tokenInChainId
          in: body
          type: integer
          required: true
          description: Source chain ID
        - name: tokenOutChainId
          in: body
          type: integer
          required: true
          description: Destination chain ID
        - name: tokenIn
          in: body
          type: string
          required: true
          description: Input token contract address
        - name: tokenOut
          in: body
          type: string
          required: true
          description: Output token contract address
        - name: amount
          in: body
          type: string
          required: true
          description: Token amount in base units
        - name: slippageTolerance
          in: body
          type: string
          required: false
          description: Slippage tolerance as a percentage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: swaps
      path: /swap
      description: Swap transaction execution
      operations:
      - name: create-swap-transaction
        method: POST
        description: Generate calldata for a swap transaction
        inputParameters:
        - name: type
          in: body
          type: string
          required: true
          description: 'Swap type: EXACT_INPUT or EXACT_OUTPUT'
        - name: tokenIn
          in: body
          type: string
          required: true
          description: Input token address
        - name: tokenOut
          in: body
          type: string
          required: true
          description: Output token address
        - name: amount
          in: body
          type: string
          required: true
          description: Token amount in base units
        - name: swapper
          in: body
          type: string
          required: true
          description: Swapper wallet address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-swap-status
        method: GET
        description: Get the status of a swap or bridge transaction
        inputParameters:
        - name: txHash
          in: query
          type: string
          required: false
          description: Transaction hash to look up
        - name: chainId
          in: query
          type: integer
          required: false
          description: Chain ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders
      path: /order
      description: Gasless UniswapX order management
      operations:
      - name: create-gasless-order
        method: POST
        description: Submit a gasless UniswapX intent order
        inputParameters:
        - name: encodedOrder
          in: body
          type: string
          required: true
          description: ABI-encoded signed order
        - name: orderType
          in: body
          type: string
          required: true
          description: Order type (e.g., Dutch_V2)
        - name: signature
          in: body
          type: string
          required: true
          description: EIP-712 signature over the order
        - name: chainId
          in: body
          type: integer
          required: true
          description: Chain ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-gasless-orders
        method: GET
        description: Retrieve gasless orders
        inputParameters:
        - name: swapper
          in: query
          type: string
          required: false
          description: Filter by swapper address
        - name: chainId
          in: query
          type: integer
          required: false
          description: Filter by chain ID
        - name: orderStatus
          in: query
          type: string
          required: false
          description: Filter by order status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: limit-orders
      path: /limit_order_quote
      description: Limit order quotes
      operations:
      - name: get-limit-order-quote
        method: POST
        description: Get a limit order quote
        inputParameters:
        - name: chainId
          in: body
          type: integer
          required: true
          description: Chain ID
        - name: tokenIn
          in: body
          type: string
          required: true
          description: Input token address
        - name: tokenOut
          in: body
          type: string
          required: true
          description: Output token address
        - name: amount
          in: body
          type: string
          required: true
          description: Input amount in base units
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lp-positions
      path: /lp
      description: Liquidity provider position management
      operations:
      - name: check-lp-approval
        method: POST
        description: Check LP token approval requirements
        inputParameters:
        - name: walletAddress
          in: body
          type: string
          required: true
          description: LP wallet address
        - name: token
          in: body
          type: string
          required: true
          description: Token address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-lp-position
        method: POST
        description: Create a V3 or V4 LP position
        inputParameters:
        - name: chainId
          in: body
          type: integer
          required: true
          description: Chain ID
        - name: walletAddress
          in: body
          type: string
          required: true
          description: LP wallet address
        - name: token0
          in: body
          type: string
          required: true
          description: First token address
        - name: token1
          in: body
          type: string
          required: true
          description: Second token address
        - name: fee
          in: body
          type: integer
          required: true
          description: Fee tier (e.g., 500 = 0.05%)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: increase-lp-position
        method: POST
        description: Increase liquidity in an LP position
        inputParameters:
        - name: chainId
          in: body
          type: integer
          required: true
          description: Chain ID
        - name: positionId
          in: body
          type: string
          required: true
          description: LP position token ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: decrease-lp-position
        method: POST
        description: Decrease liquidity in an LP position
        inputParameters:
        - name: chainId
          in: body
          type: integer
          required: true
          description: Chain ID
        - name: positionId
          in: body
          type: string
          required: true
          description: LP position token ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: claim-lp-fees
        method: POST
        description: Claim accumulated fees from an LP position
        inputParameters:
        - name: chainId
          in: body
          type: integer
          required: true
          description: Chain ID
        - name: positionId
          in: body
          type: string
          required: true
          description: LP position token ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-pool-information
        method: POST
        description: Fetch pool information
        inputParameters:
        - name: chainId
          in: body
          type: integer
          required: true
          description: Chain ID
        - name: token0
          in: body
          type: string
          required: true
          description: First token address
        - name: token1
          in: body
          type: string
          required: true
          description: Second token address
        - name: fee
          in: body
          type: integer
          required: false
          description: Fee tier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tokens
      path: /swappable_tokens
      description: Token discovery
      operations:
      - name: list-swappable-tokens
        method: GET
        description: List bridgable tokens for a given token and chain
        inputParameters:
        - name: token
          in: query
          type: string
          required: false
          description: Token address to find bridgable pairs for
        - name: chainId
          in: query
          type: integer
          required: false
          description: Source chain ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: execution-plans
      path: /plan
      description: Multi-step execution plans
      operations:
      - name: create-execution-plan
        method: POST
        description: Create a multi-step execution plan
        inputParameters:
        - name: chainId
          in: body
          type: integer
          required: true
          description: Chain ID
        - name: steps
          in: body
          type: array
          required: true
          description: Array of steps in the plan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-execution-plan
        method: GET
        description: Retrieve an execution plan by ID
        inputParameters:
        - name: planId
          in: path
          type: string
          required: true
          description: Execution plan ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: uniswap-defi-trading-api
    description: Unified REST API for DeFi trading via the Uniswap protocol.
    resources:
    - path: /v1/approvals
      name: approvals
      description: Check token approval status before executing swaps
      operations:
      - method: POST
        name: check-token-approval
        description: Check if token approval is required for a swap
        call: uniswap-trading.check-token-approval
        with:
          walletAddress: rest.walletAddress
          token: rest.token
          amount: rest.amount
          chainId: rest.chainId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/quotes
      name: quotes
      description: Get quotes for token swaps and bridges
      operations:
      - method: POST
        name: get-swap-quote
        description: Get the best quote for a token swap or cross-chain bridge
        call: uniswap-trading.get-swap-quote
        with:
          type: rest.type
          tokenInChainId: rest.tokenInChainId
          tokenOutChainId: rest.tokenOutChainId
          tokenIn: rest.tokenIn
          tokenOut: rest.tokenOut
          amount: rest.amount
          slippageTolerance: rest.slippageTolerance
          swapper: rest.swapper
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/swaps
      name: swaps
      description: Execute token swaps
      operations:
      - method: POST
        name: create-swap-transaction
        description: Generate calldata for executing a token swap
        call: uniswap-trading.create-swap-transaction
        with:
          type: rest.type
          tokenIn: rest.tokenIn
          tokenOut: rest.tokenOut
          amount: rest.amount
          swapper: rest.swapper
          slippageTolerance: rest.slippageTolerance
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get-swap-status
        description: Get the status of a swap or bridge transaction
        call: uniswap-trading.get-swap-status
        with:
          txHash: rest.txHash
          chainId: rest.chainId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders
      name: orders
      description: Gasless UniswapX order management
      operations:
      - method: POST
        name: create-gasless-order
        description: Submit a gasless UniswapX intent order
        call: uniswap-trading.create-gasless-order
        with:
          encodedOrder: rest.encodedOrder
          orderType: rest.orderType
          signature: rest.signature
          chainId: rest.chainId
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-gasless-orders
        description: List gasless orders with optional filtering
        call: uniswap-trading.list-gasless-orders
        with:
          swapper: rest.swapper
          chainId: rest.chainId
          orderStatus: rest.orderStatus
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/limit-orders
      name: limit-orders
      description: Limit order quotes and execution
      operations:
      - method: POST
        name: get-limit-order-quote
        description: Get a limit order quote for a token pair
        call: uniswap-trading.get-limit-order-quote
        with:
          chainId: rest.chainId
          tokenIn: rest.tokenIn
          tokenOut: rest.tokenOut
          amount: rest.amount
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lp-positions
      name: lp-positions
      description: Liquidity provider position lifecycle management
      operations:
      - method: POST
        name: create-lp-position
        description: Create a new V3 or V4 liquidity position
        call: uniswap-trading.create-lp-position
        with:
          chainId: rest.chainId
          walletAddress: rest.walletAddress
          token0: rest.token0
          token1: rest.token1
          fee: rest.fee
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: increase-lp-position
        description: Add liquidity to an existing position
        call: uniswap-trading.increase-lp-position
        with:
          chainId: rest.chainId
          positionId: rest.positionId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: decrease-lp-position
        description: Remove liquidity from an existing position
        call: uniswap-trading.decrease-lp-position
        with:
          chainId: rest.chainId
          positionId: rest.positionId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: claim-lp-fees
        description: Claim accumulated fees from an LP position
        call: uniswap-trading.claim-lp-fees
        with:
          chainId: rest.chainId
          positionId: rest.positionId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pools
      name: pools
      description: Liquidity pool discovery and information
      operations:
      - method: POST
        name: get-pool-information
        description: Fetch information about a Uniswap pool
        call: uniswap-trading.get-pool-information
        with:
          chainId: rest.chainId
          token0: rest.token0
          token1: rest.token1
          fee: rest.fee
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tokens
      name: tokens
      description: Token discovery for swaps and bridges
      operations:
      - method: GET
        name: list-swappable-tokens
        description: List tokens available for swapping or bridging
        call: uniswap-trading.list-swappable-tokens
        with:
          token: rest.token
          chainId: rest.chainId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: uniswap-defi-trading-mcp
    transport: http
    description: MCP server for AI-assisted DeFi trading on Uniswap.
    tools:
    - name: check-token-approval
      description: Check if a wallet has sufficient token approval for a swap transaction
      hints:
        readOnly: true
        openWorld: false
      call: uniswap-trading.check-token-approval
      with:
        walletAddress: tools.walletAddress
        token: tools.token
        amount: tools.amount
        chainId: tools.chainId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-swap-quote
      description: Get the best available quote for swapping one token for another, including gas estimates and price impact
      hints:
        readOnly: true
        openWorld: true
      call: uniswap-trading.get-swap-quote
      with:
        type: tools.type
        tokenInChainId: tools.tokenInChainId
        tokenOutChainId: tools.tokenOutChainId
        tokenIn: tools.tokenIn
        tokenOut: tools.tokenOut
        amount: tools.amount
        slippageTolerance: tools.slippageTolerance
        swapper: tools.swapper
      outputParameters:
      - type: object
        mapping: $.
    - name: create-swap-transaction
      description: Generate the calldata needed to execute a token swap on-chain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: uniswap-trading.create-swap-transaction
      with:
        type: tools.type
        tokenIn: tools.tokenIn
        tokenOut: tools.tokenOut
        amount: tools.amount
        swapper: tools.swapper
        slippageTolerance: tools.slippageTolerance
      outputParameters:
      - type: object
        mapping: $.
    - name: get-swap-status
      description: Check the status of a submitted swap or bridge transaction
      hints:
        readOnly: true
        openWorld: false
      call: uniswap-trading.get-swap-status
      with:
        txHash: tools.txHash
        chainId: tools.chainId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-gasless-order
      description: Submit a gasless UniswapX intent order where fillers compete to fill it
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: uniswap-trading.create-gasless-order
      with:
        encodedOrder: tools.encodedOrder
        orderType: tools.orderType
        signature: tools.signature
        chainId: tools.chainId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-gasless-orders
      description: List UniswapX gasless orders for a wallet with optional status filtering
      hints:
        readOnly: true
        openWorld: false
      call: uniswap-trading.list-gasless-orders
      with:
        swapper: tools.swapper
        chainId: tools.chainId
        orderStatus: tools.orderStatus
      outputParameters:
      - type: object
        mapping: $.
    - name: get-limit-order-quote
      description: Get a quote for a limit order that executes when price conditions are met
      hints:
        readOnly: true
        openWorld: true
      call: uniswap-trading.get-limit-order-quote
      with:
        chainId: tools.chainId
        tokenIn: tools.tokenIn
        tokenOut: tools.tokenOut
        amount: tools.amount
      outputParameters:
      - type: object
        mapping: $.
    - name: list-swappable-tokens
      description: List all tokens available for swapping or bridging from a given token
      hints:
        readOnly: true
        openWorld: true
      call: uniswap-trading.list-swappable-tokens
      with:
        token: tools.token
        chainId: tools.chainId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-pool-information
      description: Get detailed information about a Uniswap liquidity pool including TVL, fees, and tick data
      hints:
        readOnly: true
        openWorld: false
      call: uniswap-trading.get-pool-information
      with:
        chainId: tools.chainId
        token0: tools.token0
        token1: tools.token1
        fee: tools.fee
      outputParameters:
      - type: object
        mapping: $.
    - name: create-lp-position
      description: Create a new concentrated liquidity position in a Uniswap V3 or V4 pool
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: uniswap-trading.create-lp-position
      with:
        chainId: tools.chainId
        walletAddress: tools.walletAddress
        token0: tools.token0
        token1: tools.token1
        fee: tools.fee
      outputParameters:
      - type: object
        mapping: $.
    - name: increase-lp-position
      description: Add more liquidity to an existing LP position
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: uniswap-trading.increase-lp-position
      with:
        chainId: tools.chainId
        positionId: tools.positionId
      outputParameters:
      - type: object
        mapping: $.
    - name: decrease-lp-position
      description: Remove liquidity from an LP position
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: uniswap-trading.decrease-lp-position
      with:
        chainId: tools.chainId
        positionId: tools.positionId
      outputParameters:
      - type: object
        mapping: $.
    - name: claim-lp-fees
      description: Claim accumulated trading fees from a liquidity position
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: uniswap-trading.claim-lp-fees
      with:
        chainId: tools.chainId
        positionId: tools.positionId
      outputParameters:
      - type: object
        mapping: $.
