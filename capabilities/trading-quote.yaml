naftiko: 1.0.0-alpha2
info:
  label: Token Trading — Quote
  description: 'Token Trading — Quote. 1 operations. Lead operation: Get a quote. Self-contained Naftiko capability covering
    one Uniswap business surface.'
  tags:
  - Uniswap
  - Quote
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNISWAP_API_KEY: UNISWAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: trading-quote
    baseUri: https://trade-api.gateway.uniswap.org/v1
    description: Token Trading — Quote business capability. Self-contained, no shared references.
    resources:
    - name: quote
      path: /quote
      operations:
      - name: aggregatorquote
        method: POST
        description: Get a quote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.UNISWAP_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: trading-quote-rest
    port: 8080
    description: REST adapter for Token Trading — Quote. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/quote
      name: quote
      description: REST surface for quote.
      operations:
      - method: POST
        name: aggregatorquote
        description: Get a quote
        call: trading-quote.aggregatorquote
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: trading-quote-mcp
    port: 9090
    transport: http
    description: MCP adapter for Token Trading — Quote. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-quote
      description: Get a quote
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: trading-quote.aggregatorquote
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
