aid: uniswap
name: Uniswap
review_type: websocket-availability
question: Does Uniswap expose a documented, first-party public WebSocket API?
answer: No
summary: |
  Uniswap is an on-chain decentralized exchange protocol. Uniswap Labs does not
  publish or host a first-party public WebSocket API. The documented developer
  surface consists of (1) a REST Trading API over HTTPS, (2) GraphQL subgraph
  endpoints served by third-party infrastructure (The Graph), and (3) the
  underlying smart contracts, which are accessed via Ethereum/EVM JSON-RPC.
  Real-time access is not provided by Uniswap itself — it is a property of the
  Ethereum node provider (eth_subscribe over WebSocket) or, in some cases, of a
  third-party subgraph host. Neither of those is a Uniswap-operated WS endpoint.
investigated_on: '2026-05-29'
investigated_by: API Evangelist
findings:
  - name: Uniswap Trading API is REST over HTTPS
    detail: |
      The Uniswap Trading API at developers.uniswap.org is documented as a REST
      API. The OpenAPI description in this repo
      (openapi/uniswap-trading-openapi.yaml) and the official docs describe
      request/response JSON over HTTPS with an x-api-key header. No WebSocket,
      Server-Sent Events, or long-poll streaming endpoint is documented.
    sources:
      - https://developers.uniswap.org/
      - https://developers.uniswap.org/api/overview
      - https://developers.uniswap.org/llms.txt
  - name: Uniswap Subgraph access is GraphQL over HTTPS via The Graph
    detail: |
      Uniswap documents subgraph access through The Graph Network gateway at
      https://gateway.thegraph.com/api/<API_KEY>/subgraphs/id/<SUBGRAPH_ID>.
      This is a third-party indexing network, not a Uniswap-hosted endpoint.
      GraphQL subscriptions over WebSocket are not documented by Uniswap as a
      supported access pattern; the documented usage is HTTPS POST queries.
    sources:
      - https://developers.uniswap.org/api/overview
  - name: Real-time on-chain data is via JSON-RPC, not a Uniswap WS endpoint
    detail: |
      Uniswap is on-chain. Real-time event streams (Swap, Mint, Burn, etc.) are
      surfaced by Ethereum/L2 nodes via the standard JSON-RPC eth_subscribe
      method over a WebSocket connection. That WebSocket connection is provided
      by the node operator the developer chooses (self-hosted geth/reth/nethermind,
      Alchemy, Infura, QuickNode, Ankr, etc.) — not by Uniswap. Uniswap does not
      operate a public node WS endpoint for third-party developers.
    sources:
      - https://developers.uniswap.org/
      - https://developers.uniswap.org/llms.txt
  - name: UniswapX is REST/HTTPS, not WebSocket
    detail: |
      UniswapX is an off-chain intent/auction protocol with a REST order-flow
      API. The docs do not describe a WebSocket channel for filler/swapper
      messaging; order submission and status retrieval are HTTPS requests.
    sources:
      - https://docs.uniswap.org/
documented_apis:
  - name: Uniswap Trading API
    protocol: REST/HTTPS
    websocket: false
    notes: First-party, requires x-api-key. No WS, no SSE.
  - name: Uniswap Subgraph API
    protocol: GraphQL over HTTPS (via The Graph)
    websocket: false
    notes: |
      Third-party infrastructure (The Graph Network gateway). Uniswap does not
      operate this endpoint. WebSocket GraphQL subscriptions are not part of
      the documented access pattern.
  - name: UniswapX API
    protocol: REST/HTTPS
    websocket: false
    notes: Off-chain intent/order REST API. No documented WS endpoint.
  - name: Uniswap smart contracts
    protocol: EVM JSON-RPC
    websocket: indirect
    notes: |
      Real-time on-chain events are obtained via eth_subscribe on a JSON-RPC
      node provider's WebSocket endpoint. That WebSocket belongs to the node
      provider, not to Uniswap.
recommendations_for_realtime:
  - Use a JSON-RPC node provider (Alchemy, Infura, QuickNode, Ankr, self-hosted)
    and call eth_subscribe over its WebSocket endpoint to receive Uniswap
    contract logs in real time.
  - For indexed/historical real-time data, evaluate The Graph subgraph hosting
    options. Note this is third-party infrastructure, not Uniswap.
  - Do not represent a Uniswap real-time WebSocket as a first-party Uniswap API.
    No such endpoint is documented by Uniswap Labs.
asyncapi_recommendation:
  produce: false
  reason: |
    There is no first-party Uniswap-hosted WebSocket, SSE, or message-broker
    endpoint to describe. An AsyncAPI specification would have to fabricate
    channels, servers, and message schemas that Uniswap does not publish.
    Generating one would misrepresent the actual API surface.
sources_checked:
  - url: https://docs.uniswap.org/
    note: Redirects to https://developers.uniswap.org/
  - url: https://developers.uniswap.org/
    note: Developer portal landing page. References API, TypeScript SDK, and Protocols. No WebSocket mentioned.
  - url: https://developers.uniswap.org/api/overview
    note: API overview page. Documents REST Trading API and GraphQL subgraph access via The Graph gateway. No WebSocket endpoint listed.
  - url: https://developers.uniswap.org/llms.txt
    note: LLM-oriented index of the developer docs. References REST, GraphQL, and JSON-RPC. No WebSocket/streaming/subscription endpoints.
  - url: https://developers.uniswap.org/api/reference/overview
    note: 404 Not Found at the time of review.
