      - maxPrice
      type: object
    PositionTickBounds:
      description: Tick bounds for a concentrated liquidity position.
      properties:
        tickLower:
          description: The lower tick of the position range.
          type: integer
        tickUpper:
          description: The upper tick of the position range.
          type: integer
      required:
      - tickLower
      - tickUpper
      type: object
    PriorityInput:
      properties:
        amount:
          $ref: '#/components/schemas/tokenAmount'
        mpsPerPriorityFeeWei:
          type: string
        token:
          $ref: '#/components/schemas/inputToken'
      required:
      - amount
      - token
      - mpsPerPriorityFeeWei
      type: object
    PriorityOrderInfo:
      properties:
        additionalValidationContract:
          $ref: '#/components/schemas/additionalValidationContract'
        additionalValidationData:
          $ref: '#/components/schemas/additionalValidationData'
        auctionStartBlock:
          type: string
        baselinePriorityFeeWei:
          type: string
        chainId:
          $ref: '#/components/schemas/ChainId'
        cosigner:
          $ref: '#/components/schemas/cosignerAddress'
        deadline:
          $ref: '#/components/schemas/deadline'
        input:
          $ref: '#/components/schemas/PriorityInput'
        nonce:
          $ref: '#/components/schemas/nonce'
        outputs:
          items:
            $ref: '#/components/schemas/PriorityOutput'
          type: array
        reactor:
          $ref: '#/components/schemas/contractAddress'
        swapper:
          $ref: '#/components/schemas/receiverWalletAddress'
      required:
      - chainId
      - nonce
      - reactor
      - swapper
      - deadline
      - validationContract
      - validationData
      - auctionStartBlock
      - baselinePriorityFeeWei
      - input
      - outputs
      - cosigner
      type: object
    PriorityOutput:
      properties:
        amount:
          $ref: '#/components/schemas/tokenAmount'
        mpsPerPriorityFeeWei:
          description: The scaling factor of the priority fee based on the output
            token amount.
          type: string
        recipient:
          $ref: '#/components/schemas/receiverWalletAddress'
        token:
          $ref: '#/components/schemas/outputToken'
      required:
      - amount
      - token
      - recipient
      - mpsPerPriorityFeeWei
      type: object
    PriorityQuote:
      properties:
        aggregatedOutputs:
          items:
            $ref: '#/components/schemas/AggregatedOutput'
          type: array
        classicGasUseEstimateUSD:
          $ref: '#/components/schemas/ClassicGasUseEstimateUSD'
        deadlineBufferSecs:
          type: number
        encodedOrder:
          $ref: '#/components/schemas/encodedOrder'
        expectedAmountIn:
          $ref: '#/components/schemas/tokenAmount'
        expectedAmountOut:
          $ref: '#/components/schemas/tokenAmount'
        orderId:
          $ref: '#/components/schemas/orderId'
        orderInfo:
          $ref: '#/components/schemas/PriorityOrderInfo'
        portionAmount:
          $ref: '#/components/schemas/portionAmount'
        portionBips:
          $ref: '#/components/schemas/portionBips'
        portionRecipient:
          $ref: '#/components/schemas/portionAmountReceiverAddress'
        quoteId:
          $ref: '#/components/schemas/quoteId'
        slippageTolerance:
          $ref: '#/components/schemas/slippageTolerance'
      required:
      - encodedOrder
      - orderInfo
      - orderId
      title: UniswapX Priority Quote
      type: object
    ProtocolItems:
      description: The protocol to use for the swap/order.
      enum:
      - V2
      - V3
      - V4
      - UNISWAPX
      - UNISWAPX_V2
      - UNISWAPX_V3
      type: string
    Protocols:
      description: The protocols to use for the swap/order. If the `protocols` field
        is defined, then you can only set the `routingPreference` to `BEST_PRICE`.
        Note that the value `UNISWAPX` is deprecated and will be removed in a future
        release.
      items:
        $ref: '#/components/schemas/ProtocolItems'
      type: array
    Quote:
      oneOf:
      - $ref: '#/components/schemas/DutchQuote'
      - $ref: '#/components/schemas/ClassicQuote'
      - $ref: '#/components/schemas/WrapUnwrapQuote'
      - $ref: '#/components/schemas/DutchQuoteV2'
      - $ref: '#/components/schemas/DutchQuoteV3'
      - $ref: '#/components/schemas/BridgeQuote'
      - $ref: '#/components/schemas/PriorityQuote'
      - $ref: '#/components/schemas/ChainedQuote'
    QuoteRequest:
      properties:
        amount:
          $ref: '#/components/schemas/tokenAmount'
        autoSlippage:
          $ref: '#/components/schemas/AutoSlippage'
        generatePermitAsTransaction:
          $ref: '#/components/schemas/generatePermitAsTransaction'
        hooksOptions:
          $ref: '#/components/schemas/HooksOptions'
        integratorFees:
          description: Optional integrator fee configuration. When provided, the specified
            fee is applied to the swap instead of the default partner fee service.
            Only one fee entry is currently supported.
          items:
            $ref: '#/components/schemas/IntegratorFee'
          maxItems: 1
          minItems: 1
          type: array
        permitAmount:
          $ref: '#/components/schemas/PermitAmount'
        protocols:
          $ref: '#/components/schemas/Protocols'
        routingPreference:
          $ref: '#/components/schemas/RoutingPreference'
        slippageTolerance:
          $ref: '#/components/schemas/slippageTolerance'
        spreadOptimization:
          $ref: '#/components/schemas/SpreadOptimization'
        swapper:
          $ref: '#/components/schemas/senderWalletAddress'
        tokenIn:
          $ref: '#/components/schemas/inputToken'
        tokenInChainId:
          $ref: '#/components/schemas/ChainId'
        tokenOut:
          $ref: '#/components/schemas/outputToken'
        tokenOutChainId:
          $ref: '#/components/schemas/ChainId'
        type:
          $ref: '#/components/schemas/TradeType'
        urgency:
          $ref: '#/components/schemas/Urgency'
        walletExecutionContext:
          $ref: '#/components/schemas/WalletExecutionContext'
      required:
      - type
      - amount
      - tokenInChainId
      - tokenOutChainId
      - tokenIn
      - tokenOut
      - swapper
      type: object
    QuoteResponse:
      properties:
        permitData:
          $ref: '#/components/schemas/NullablePermit'
        permitGasFee:
          $ref: '#/components/schemas/gasFee'
        permitTransaction:
          $ref: '#/components/schemas/TransactionRequest'
        quote:
          $ref: '#/components/schemas/Quote'
        requestId:
          $ref: '#/components/schemas/RequestId'
        routing:
          $ref: '#/components/schemas/Routing'
        sponsorshipInfo:
          $ref: '#/components/schemas/SponsorshipInfo'
      required:
      - routing
      - quote
      - permitData
      - requestId
      type: object
    RequestId:
      description: A unique ID for the request.
      type: string
    Routing:
      description: The routing for the proposed transaction.
      enum:
      - CLASSIC
      - DUTCH_LIMIT
      - DUTCH_V2
      - DUTCH_V3
      - BRIDGE
      - LIMIT_ORDER
      - PRIORITY
      - WRAP
      - UNWRAP
      - CHAINED
      type: string
    RoutingPreference:
      default: BEST_PRICE
      description: The `routingPreference` specifies the preferred strategy to determine
        the quote. If the `routingPreference` is `BEST_PRICE`, then the quote will
        propose a route through the specified whitelisted protocols (or all, if none
        are specified) that provides the best price. When the `routingPreference`
        is `FASTEST`, the quote will propose the first route which is found to complete
        the swap.
      enum:
      - BEST_PRICE
      - FASTEST
      type: string
    SafetyLevel:
      enum:
      - BLOCKED
      - MEDIUM_WARNING
      - STRONG_WARNING
      - VERIFIED
      type: string
    ScopeData:
      description: Data defining a wallet scope including accounts, methods, capabilities,
        chains, and client context.
      properties:
        accounts:
          description: Array of account addresses associated with this scope.
          items:
            type: string
          type: array
        capabilities:
          additionalProperties: true
          description: Additional capabilities for this scope.
          type: object
        chains:
          description: Array of chain identifiers allowed in this scope.
          items:
            type: string
          type: array
        clientContext:
          $ref: '#/components/schemas/ClientContext'
        methods:
          description: Array of methods allowed in this scope.
          items:
            type: string
          type: array
      required:
      - accounts
      - methods
      type: object
    SettledAmount:
      properties:
        amountIn:
          $ref: '#/components/schemas/tokenAmount'
        amountOut:
          $ref: '#/components/schemas/tokenAmount'
        tokenIn:
          $ref: '#/components/schemas/inputToken'
        tokenOut:
          $ref: '#/components/schemas/outputToken'
      type: object
    SortKey:
      enum:
      - createdAt
      type: string
    SponsorSummary:
      description: Display information about the sponsor covering gas fees for the
        swap.
      properties:
        logoUrl:
          description: URL of the sponsor's logo.
          type: string
        name:
          description: Display name of the sponsor.
          type: string
      type: object
    SponsorshipInfo:
      description: Gas sponsorship information for the quoted swap. When `sponsored`
        is `true`, gas fees for executing this swap will be covered by the `sponsor`.
        When `sponsored` is `false`, `rejectionReason` describes why sponsorship was
        not granted.
      properties:
        rejectionReason:
          description: Reason gas sponsorship was not granted. Present only when `sponsored`
            is `false`.
          type: string
        sponsor:
          $ref: '#/components/schemas/SponsorSummary'
        sponsored:
          description: Whether gas for this swap is sponsored.
          type: boolean
      type: object
    SpreadOptimization:
      default: EXECUTION
      description: For UniswapX swaps, when set to `EXECUTION`, quotes optimize for
        looser spreads at higher fill rates. When set to `PRICE`, quotes optimize
        for tighter spreads at lower fill rates. This field is not applicable to Uniswap
        Protocols (v2, v3, v4), bridging, or wrapping/unwrapping and will be ignored
        if set.
      enum:
      - EXECUTION
      - PRICE
      type: string
    StepUpdate:
      description: 'Represents a single step update with proof. Note: orderId is not
        accepted in update requests; it is system-generated after receiving a signature.'
      properties:
        proof:
          description: Proof of step completion. Must provide either txHash or signature.
          properties:
            signature:
              description: The signature for a message signing step.
              pattern: ^0x[a-fA-F0-9]{130}$
              type: string
            txHash:
              $ref: '#/components/schemas/TransactionHash'
          type: object
        stepIndex:
          description: The index of the step being updated (0-based).
          type: number
      required:
      - stepIndex
      - proof
      type: object
    SwapSafetyMode:
      description: Swap safety mode will automatically sweep the transaction for the
        native token and return it to the sender wallet address. This is to prevent
        accidental loss of funds in the event that the token amount is set in the
        transaction value instead of as part of the calldata.
      enum:
      - SAFE
      type: string
    SwapStatus:
      enum:
      - PENDING
      - SUCCESS
      - NOT_FOUND
      - FAILED
      - EXPIRED
