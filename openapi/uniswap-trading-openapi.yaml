  /order:
    post:
      description: 'The order endpoint is used to submit a UniswapX intent. If the
        `routing` field in the response to a quote is any of `DUTCH_V2`, `DUTCH_V3`,
        `LIMIT_ORDER`, or `PRIORITY` this endpoint is used to submit your order to
        the UniswapX protocol to be filled by the filler network. These orders are
        gasless because the filler will pay the gas to complete the transaction.


        The order will be validated and, if valid, will be submitted to the filler
        network. The network will try to fill the order at the quoted `startAmount`.
        If the order is not filled at the `startAmount` by the `deadline`, the amount
        will start decaying until the `endAmount` is reached. The order will remain
        `open` until it is either filled, canceled, or has expired by remaining unfilled
        beyond the `decayEndTime`.


        For simplicity, the order request is identical to the quote response except
        for the addition of the signed permit.


        Native ETH on UniswapX: If the quote you are submitting uses native ETH as
        the input token (e.g. `tokenIn` is `0x0000000000000000000000000000000000000000`),
        include `x-erc20eth-enabled: true`. Native ETH input on UniswapX requires
        wallet support for EIP-7914 and sufficient native allowance. For 7702-delegated
        smart contract wallets, you can generate the required approval call(s) via
        `/swap_7702` when needed.'
      operationId: post_order
      parameters:
      - $ref: '#/components/parameters/erc20EthEnabledHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          $ref: '#/components/responses/OrderSuccess201'
        '400':
          $ref: '#/components/responses/BadRequest400'
        '401':
