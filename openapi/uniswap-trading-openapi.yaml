    LimitOrderQuoteResponse:
      properties:
        permitData:
          $ref: '#/components/schemas/NullablePermit'
        quote:
          $ref: '#/components/schemas/DutchQuote'
        requestId:
          $ref: '#/components/schemas/RequestId'
        routing:
          enum:
          - LIMIT_ORDER
          type: string
      required:
      - routing
      - quote
      - permitData
      - requestId
      type: object
    NullablePermit:
      description: the permit2 message object for the customer to sign to permit spending
        by the permit2 contract.
      nullable: true
      properties:
        domain:
          type: object
        types:
          type: object
        values:
          type: object
      type: object
    OrderIds:
      type: string
    OrderInput:
      properties:
        endAmount:
          $ref: '#/components/schemas/endAmount'
        startAmount:
          $ref: '#/components/schemas/startAmount'
        token:
          $ref: '#/components/schemas/inputToken'
      required:
      - token
      type: object
    OrderOutput:
      properties:
        endAmount:
          $ref: '#/components/schemas/endAmount'
        isFeeOutput:
          type: boolean
        recipient:
          $ref: '#/components/schemas/receiverWalletAddress'
        startAmount:
          $ref: '#/components/schemas/startAmount'
        token:
          $ref: '#/components/schemas/outputToken'
      required:
      - token
      type: object
    OrderRequest:
      properties:
        quote:
          oneOf:
          - $ref: '#/components/schemas/DutchQuoteV2'
          - $ref: '#/components/schemas/DutchQuoteV3'
          - $ref: '#/components/schemas/PriorityQuote'
        routing:
          $ref: '#/components/schemas/Routing'
        signature:
          description: The signed permit.
          type: string
      required:
      - signature
      - quote
      type: object
    OrderResponse:
      properties:
        orderId:
          $ref: '#/components/schemas/orderId'
        orderStatus:
          $ref: '#/components/schemas/OrderStatus'
        requestId:
          $ref: '#/components/schemas/RequestId'
      required:
      - requestId
      - orderId
      - orderStatus
      type: object
    OrderStatus:
      description: "The status of the order. Note that all of these are final states\
        \ with the exception of Open, meaning that no further state changes will occur.\
        \ \n Open - order is not yet filled by a filler.\n Expired - order has expired\
        \ without being filled and is no longer fillable.\n Error - a catchall for\
        \ other final states which are not otherwise specified, where the order will\
        \ not be filled.\n Cancelled - order is cancelled. Note that to cancel an\
        \ order, a new order must be placed with the same nonce as the prior open\
        \ order and it must be placed within the same block as the original order.\n\
        \ Filled - order is filled.\n Insufficient-funds - the swapper (you) do not\
        \ have enough funds for the order to be completed and the order is cancelled\
        \ and will not be filled.\n Unverified - order has not been verified yet."
      enum:
      - open
      - expired
      - error
      - cancelled
      - filled
      - unverified
      - insufficient-funds
      type: string
    OrderType:
      enum:
      - DutchLimit
      - Dutch
      - Dutch_V2
      - Dutch_V3
      - Priority
      type: string
    OrderTypeQuery:
      enum:
      - Dutch_V2
      - Dutch_V3
      - Limit
      - Priority
      type: string
    Permit:
      description: the permit2 message object for the customer to sign to permit spending
        by the permit2 contract.
      properties:
        domain:
          type: object
        types:
          type: object
        values:
          type: object
      type: object
    PermitAmount:
      default: FULL
      description: For Uniswap Protocols (v2, v3, v4) swaps, specify the input token
        spend allowance (e.g. quantity) to be set in the permit. `FULL` can be used
        to specify an unlimited token quantity, and may prevent the wallet from needing
        to sign another permit for the same token in the future. `EXACT` can be used
        to specify the exact input token quantity for this request. Defaults to `FULL`.
      enum:
      - FULL
      - EXACT
      type: string
    PlanResponse:
      properties:
        autoSlippage:
          $ref: '#/components/schemas/AutoSlippage'
        completedAt:
          description: Timestamp when the plan completed.
          format: date-time
          type: string
        createdAt:
          description: Timestamp when the plan was created.
          format: date-time
          type: string
        currentStepIndex:
          description: The index of the current step that needs to be executed (0-based).
          type: number
        expectedOutput:
          $ref: '#/components/schemas/tokenAmount'
        gasFee:
          $ref: '#/components/schemas/gasFee'
        gasFeeQuote:
          $ref: '#/components/schemas/gasFeeInCurrency'
        gasFeeUSD:
          $ref: '#/components/schemas/gasFeeUSD'
        gasStrategies:
          description: Gas strategies used for the plan.
          items:
            $ref: '#/components/schemas/GasStrategy'
          type: array
        gasUseEstimate:
          $ref: '#/components/schemas/gasLimit'
        hooksOptions:
          $ref: '#/components/schemas/HooksOptions'
        lastUserActionAt:
          description: Timestamp of the last user action on this plan.
          format: date-time
          type: string
        planId:
          description: A unique identifier for this execution plan.
          type: string
        protocols:
          $ref: '#/components/schemas/Protocols'
        quoteId:
          $ref: '#/components/schemas/quoteId'
        recipient:
          $ref: '#/components/schemas/receiverWalletAddress'
        requestId:
          $ref: '#/components/schemas/RequestId'
        slippageTolerance:
          $ref: '#/components/schemas/slippageTolerance'
        status:
          $ref: '#/components/schemas/PlanStatus'
        steps:
          description: The sequential steps that need to be executed to complete the
            plan.
          items:
            $ref: '#/components/schemas/PlanStep'
          type: array
        swapper:
          $ref: '#/components/schemas/senderWalletAddress'
        timeEstimateMs:
          description: Estimated time in milliseconds to complete the entire plan.
          type: number
        updatedAt:
          description: Timestamp when the plan was last updated.
          format: date-time
          type: string
        walletExecutionContext:
          $ref: '#/components/schemas/WalletExecutionContext'
      required:
      - requestId
      - planId
      - swapper
      - recipient
      - quoteId
      - status
      - steps
      - currentStepIndex
      - expectedOutput
      type: object
    PlanStatus:
      description: The overall status of the plan execution. ACTIVE means the plan
        is ready to begin (all steps NOT_READY). AWAITING_ACTION means at least one
        step requires user action. IN_PROGRESS means at least one step is executing.
        COMPLETED means all steps have been successfully executed. FAILED means the
        plan cannot be completed.
      enum:
      - ACTIVE
      - AWAITING_ACTION
      - IN_PROGRESS
      - COMPLETED
      - FAILED
      type: string
    PlanStep:
      properties:
        gasFee:
          $ref: '#/components/schemas/gasFee'
        gasFeeQuote:
          $ref: '#/components/schemas/gasFeeInCurrency'
        gasFeeUSD:
          $ref: '#/components/schemas/gasFeeUSD'
        gasPrice:
          $ref: '#/components/schemas/gasPrice'
        gasUseEstimate:
          $ref: '#/components/schemas/gasLimit'
        maxFeePerGas:
          $ref: '#/components/schemas/maxFeePerGas'
        maxPriorityFeePerGas:
          $ref: '#/components/schemas/maxPriorityFeePerGas'
        method:
          $ref: '#/components/schemas/PlanStepMethod'
        payload:
          description: The payload data for this step. The structure depends on the
            payloadType.
          type: object
        payloadType:
          $ref: '#/components/schemas/PlanStepPayloadType'
        proof:
          $ref: '#/components/schemas/PlanStepProof'
        recipient:
          $ref: '#/components/schemas/receiverWalletAddress'
        routingStepKey:
          description: An optional key identifying the routing strategy used for this
            step.
          type: string
        slippage:
          $ref: '#/components/schemas/slippageTolerance'
        status:
          $ref: '#/components/schemas/PlanStepStatus'
        stepIndex:
          description: The index of this step in the plan (0-based).
          type: number
        stepType:
          $ref: '#/components/schemas/PlanStepType'
        swapper:
          $ref: '#/components/schemas/senderWalletAddress'
        tokenIn:
          $ref: '#/components/schemas/inputToken'
        tokenInAmount:
          $ref: '#/components/schemas/tokenAmount'
        tokenInChainId:
          $ref: '#/components/schemas/ChainId'
        tokenOut:
          $ref: '#/components/schemas/outputToken'
        tokenOutAmount:
          $ref: '#/components/schemas/tokenAmount'
        tokenOutChainId:
          $ref: '#/components/schemas/ChainId'
      required:
      - stepIndex
      - method
      - payloadType
      - payload
      - status
      type: object
    PlanStepMethod:
      description: The execution method for the step. SEND_TX is a standard transaction.
        SIGN_MSG is for signing a message (e.g., permit). SEND_CALLS is for batch
        transaction execution (EIP-5792).
      enum:
      - SEND_TX
      - SIGN_MSG
      - SEND_CALLS
      type: string
    PlanStepPayloadType:
      description: The type of payload data. TX is a standard transaction object.
        EIP_712 is a typed structured data for signing. EIP_5792 is a batch of transaction
        calls.
      enum:
      - TX
      - EIP_712
      - EIP_5792
      type: string
    PlanStepProof:
      description: Proof of execution for a plan step, provided after the step is
        completed.
      properties:
        orderId:
          description: The order ID for a gasless order step.
          type: string
        signature:
          description: The signature for a message signing step.
          type: string
        txHash:
          $ref: '#/components/schemas/TransactionHash'
      type: object
    PlanStepStatus:
      description: The status of an individual step. NOT_READY means prerequisites
        are not met. AWAITING_ACTION means the step is ready for user action. IN_PROGRESS
        means the step is being executed. COMPLETE means the step finished successfully.
        STEP_ERROR means the step failed.
      enum:
      - NOT_READY
      - AWAITING_ACTION
      - IN_PROGRESS
      - COMPLETE
      - STEP_ERROR
      type: string
    PlanStepType:
      description: The type of step in a plan, including swap types and approval types.
      enum:
      - DUTCH_LIMIT
      - CLASSIC
      - DUTCH_V2
      - LIMIT_ORDER
      - WRAP
      - UNWRAP
      - BRIDGE
      - PRIORITY
      - DUTCH_V3
      - QUICKROUTE
      - CHAINED
      - APPROVAL_TXN
      - APPROVAL_PERMIT
      - RESET_APPROVAL_TXN
      type: string
    PoolInfoRequest:
      properties:
        chainId:
          $ref: '#/components/schemas/ChainId'
        currentPage:
          type: number
        pageSize:
          type: number
        poolParameters:
          $ref: '#/components/schemas/PoolParameters'
        poolReferences:
          description: Array of pool reference identifiers to query. Each reference
            should include the protocol, chainId, and either the pool address (V3),
            pool id (V4), or pair address (V2).
          items:
            $ref: '#/components/schemas/PoolReferenceByProtocol'
          type: array
        protocol:
          $ref: '#/components/schemas/Protocols'
      required:
      - protocol
      type: object
    PoolInfoResponse:
      properties:
        currentPage:
