    TradeType:
      default: EXACT_INPUT
      description: The handling of the `amount` field. `EXACT_INPUT` means the requester
        will send the specified `amount` of input tokens and get a quote with a variable
        quantity of output tokens. `EXACT_OUTPUT` means the requester will receive
        the specified `amount` of output tokens and get a quote with a variable quantity
        of input tokens.
      enum:
      - EXACT_INPUT
      - EXACT_OUTPUT
      type: string
    TransactionFailureReason:
