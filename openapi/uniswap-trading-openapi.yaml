        currentTick:
          $ref: '#/components/schemas/lpTickCurrent'
        fee:
          $ref: '#/components/schemas/poolFee'
        hookAddress:
          description: The address of the hook for the pool, if any.
          type: string
        poolLiquidity:
          $ref: '#/components/schemas/liquidity'
        poolProtocol:
          $ref: '#/components/schemas/Protocols'
        poolReferenceIdentifier:
          description: The unique identifier for the pool reference, which can be
            a pool address, pool id, or pair address depending on the protocol.
          type: string
        sqrtRatioX96:
          $ref: '#/components/schemas/sqrtRatioX96'
        tickSpacing:
          $ref: '#/components/schemas/tickSpacing'
        tokenAReserves:
          $ref: '#/components/schemas/tokenAmount'
        tokenAddressA:
          pattern: ^(0x)?[0-9a-fA-F]{40}$
          type: string
        tokenAddressB:
          pattern: ^(0x)?[0-9a-fA-F]{40}$
          type: string
        tokenAmountA:
          $ref: '#/components/schemas/tokenAmount'
        tokenAmountB:
          $ref: '#/components/schemas/tokenAmount'
        tokenBReserves:
          $ref: '#/components/schemas/tokenAmount'
        tokenDecimalsA:
          description: The number of decimals for token A.
          type: number
        tokenDecimalsB:
          description: The number of decimals for token B.
          type: number
      type: object
    PoolParameters:
      properties:
        fee:
          description: The fee of the pool, if the pool has a fee value.
          type: number
        hookAddress:
          description: The address of the hook for the pool, if any.
          type: string
        tickSpacing:
          $ref: '#/components/schemas/tickSpacing'
        tokenAddressA:
          description: The address of the first token in the pair.
          pattern: ^(0x)?[0-9a-fA-F]{40}$
          type: string
        tokenAddressB:
          description: The address of the second token in the pair.
          pattern: ^(0x)?[0-9a-fA-F]{40}$
          type: string
      type: object
    PoolReferenceByProtocol:
      properties:
        chainId:
          $ref: '#/components/schemas/ChainId'
