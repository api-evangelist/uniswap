    additionalValidationContract:
      default: '0x0000000000000000000000000000000000000000'
      deprecated: true
      description: Unused and deprecated.
      type: string
    additionalValidationData:
      default: 0x
      deprecated: true
      description: Unused and deprecated.
      type: string
    bps:
      description: The portion of the swap stated in basis points. Fractional basis
        points are supported with up to two decimal places (e.g. 12.5).
      multipleOf: 0.01
      type: number
    bpsFee:
      description: A fee charged by the token specified in basis points. Field is
        not present if the token does not charge a fee.
      type: string
    contractAddress:
      description: The address of a contract which will be used to facilitate the
        swap.
      pattern: ^(0x)?[0-9a-fA-F]{40}$
      type: string
    cosignerAddress:
      description: The address of a cosigner who will run the auction and ensure the
        best executable price within the given parameters. Currently the cosigner
        is always Uniswap Labs.
      pattern: ^(0x)?[0-9a-fA-F]{40}$
      type: string
    deadline:
      description: The unix timestamp at which the order will be reverted if not filled.
      type: number
    encodedOrder:
      description: An encoded copy of the order details which will be submitted to
        the filler network along with the signed permit.
      type: string
    endAmount:
      description: The worst case quantity of tokens resulting from this swap.
      type: string
    gasFee:
      description: The total estimated gas cost of this transaction (eg. `gasLimit`
        multiplied by `maxFeePerGas`) in the base unit of the chain.
      type: string
    gasFeeInCurrency:
      description: The total estimated gas cost of this transaction (eg. gasLimit
        multiplied by maxFeePerGas) in the quoted currency (e.g. output token) in
        the base units of the quoted currency.
      type: string
    gasFeeUSD:
      description: The total estimated gas cost of this transaction (eg. `gasLimit`
        multiplied by `maxFeePerGas`) denominated in USDC.
      type: string
    gasLimit:
      description: The maximum units of gas that will be consumed by this transaction.
      type: string
    gasPrice:
      description: The cost per unit of gas.
      type: string
    generatePermitAsTransaction:
      default: false
      description: Indicates whether you want to receive a permit2 transaction to
        sign and submit onchain, or a permit message to sign. When set to `true`,
        the quote response returns the Permit2 as a calldata which the user signs
        and broadcasts. When set to `false` (the default), the quote response returns
        the Permit2 as a message which the user signs but does not need to broadcast.
        When using a 7702-delegated wallet, set this field to `true`. Except for this
        scenario, it is recommended that this field is set to false. Note that a Permit2
        calldata (e.g. `true`), will provide indefinite permission for Permit2 to
        spend a token, in contrast to a Permit2 message (e.g. `false`) which is only
        valid for 30 days. Further, a Permit2 calldata (e.g. `true`) requires the
        user to pay gas to submit the transaction, whereas the Permit2 message (e.g.
        `false` ) does not require the user to submit a transaction and requires no
        gas.
      type: boolean
    includeGasInfo:
      default: false
      description: If set to `true`, the response will include the estimated gas fee
        for the proposed transaction.
      type: boolean
    inputToken:
      description: The token which will be sent, specified by its token address. For
        a list of supported tokens, see the [FAQ](https://api-docs.uniswap.org/guides/faqs).
      pattern: ^(0x)?[0-9a-fA-F]{40}$
      type: string
    isSpam:
      description: Whether the token is considered a spam token.
      type: boolean
    liquidity:
      description: The amount of liquidity in the pool at a given tick. For more information
        see the [Uniswap V3 Whitepaper](https://app.uniswap.org/whitepaper-v3.pdf).
      type: string
    lpTickCurrent:
      description: The current tick of the pool. For more information see the [Uniswap
        V3 Whitepaper](https://app.uniswap.org/whitepaper-v3.pdf).
      type: number
    maxFeePerGas:
      description: The sum of the base fee and priority fee. Subtracting `maxPriorityFeePerGas`
        from this value will yield the base fee to be paid for this transaction.
      type: string
    maxPriorityFeePerGas:
      description: The maximum tip to the block builder. Adjusted based upon the urgency
        specified in the request.
      type: string
    minAmount:
      description: The minimum portion of the swap, stated in the base unit of the
        token, which will be output to the recipient.
      type: string
    nonce:
      description: A unique nonce for this order.
      type: string
    orderId:
      description: A unique ID for the order. Used to track the order's status.
      type: string
    outputToken:
      description: The token which will be received, specified by its token address.
        For a list of supported tokens, see the [FAQ](https://api-docs.uniswap.org/guides/faqs).
      pattern: ^(0x)?[0-9a-fA-F]{40}$
      type: string
    poolFee:
      description: The fee of the pool in basis points.
      type: string
    portionAmount:
      description: The portion of the swap that will be taken as a fee in the base
        units of the token. The fee will be taken from the output token.
      type: string
    portionAmountReceiverAddress:
      description: The wallet address which will receive the fee.
      type: string
    portionBips:
      description: The portion of the swap that will be taken as a fee stated in basis
        points. Fractional basis points are supported with up to two decimal places
        (e.g. 87.5 for 0.875%). The fee will be taken from the output token.
      multipleOf: 0.01
      type: number
    quoteId:
      description: A unique ID for the quote.
      type: string
    receiverWalletAddress:
      description: The wallet address which will receive the token.
      pattern: ^(0x)?[0-9a-fA-F]{40}$
      type: string
    senderWalletAddress:
      description: The wallet address which will be used to send the token.
      pattern: ^(0x)?[0-9a-fA-F]{40}$
      type: string
    slippageTolerance:
      description: 'The slippage tolerance as a percentage up to a maximum of two
        decimal places. For Uniswap Protocols (v2, v3, v4), the slippage tolerance
        is the maximum amount the price can change between the time the transaction
        is submitted and the time it is executed. The slippage tolerance is a percentage
        of the total value of the swap.


        When submitting a quote, note that slippage tolerance works differently in
        UniswapX swaps where it does not set a limit on the Spread in an order. See
        [here](https://api-docs.uniswap.org/guides/faqs#why-do-uniswapx-quotes-have-more-slippage-than-the-tolerance-i-set)
        for more information.


        Note that if the trade type is `EXACT_INPUT`, then the slippage is in terms
        of the output token. If the trade type is `EXACT_OUTPUT`, then the slippage
        is in terms of the input token.


        When submitting a request, `slippageTolerance` may not be set when `autoSlippage`
        is defined. One of `slippageTolerance` or `autoSlippage` must be defined.'
      pattern: ^[0-9]{0,3}\.?[0-9]{0,2}$
      type: number
    sqrtRatioX96:
      description: The square root of the ratio of the token0 and token1 in the pool,
        as a Q64.64 number. For more information see the [Uniswap V3 Whitepaper](https://app.uniswap.org/whitepaper-v3.pdf).
      type: string
    startAmount:
      description: The intended execution quantity of tokens resulting from this swap.
      type: string
    tickCurrent:
      description: The current tick of the pool. For more information see the [Uniswap
        V3 Whitepaper](https://app.uniswap.org/whitepaper-v3.pdf).
      type: string
    tickSpacing:
      description: The width of ticks in this pool (e.g. the price range between two
        ticks) specified in basis points. For more information see the [Uniswap V3
        Whitepaper](https://app.uniswap.org/whitepaper-v3.pdf).
      type: number
    tokenAmount:
      description: The quantity of tokens denominated in the token's base units. (For
        example, for an ERC20 token one token is 1x10^18 base units. For one USDC
        token one token is 1x10^6 base units.) This value must be greater than 0.
      pattern: ^[0-9]+$
      type: string
    tokenSymbol:
      description: The symbol of the token.
      type: string
  securitySchemes:
    apiKey:
      in: header
      name: x-api-key
      type: apiKey
info:
  description: 'Uniswap Labs trading APIs.


    Each operation may include the vendor extension `x-public-endpoint` (boolean):
    `true` when the operation is available on the public gateway for standard API
    keys, `false` when it is not publicly exposed. See the [OpenAPI specification
    extensions](https://swagger.io/docs/specification/v3_0/openapi-extensions/) definition
    of `x-` fields.'
  title: Token Trading
  version: 1.0.0
openapi: 3.0.0
paths:
  /check_approval:
    post:
      description: 'Allows the requestor to check if the `walletAddress` has the required
        approval to transact the `token` up to the `amount` specified. If the `walletAddress`
        does not have the required approval, the response will include a transaction
        to approve the token spend. If the `walletAddress` has the required approval,
        the response will return the approval with a `null` value. If the parameter
        `includeGasInfo` is set to `true` and an approval is needed, then the response
        will include both the transaction and the gas fee for the approval transaction.


        Certain tokens may require that approval be reset before approving a new spend
        amount. If this condition is detected for the `walletAddress` and `token`,
        the response will include the necessary approval cancellation in the `cancel`
        paragraph. When `cancel` is not applicable, the paragraph will have a `null`
        value.'
      operationId: check_approval
      parameters:
      - $ref: '#/components/parameters/permit2DisabledHeader'
      requestBody:
        content:
          application/json:
            example:
              amount: '2516'
              chainId: 1
              includeGasInfo: true
              token: '0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599'
              urgency: urgent
              walletAddress: '0xC9bebBA9f481b12cE6f3EA54c4B182c9636ec421'
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          $ref: '#/components/responses/ApprovalSuccess200'
        '400':
          $ref: '#/components/responses/BadRequest400'
        '401':
          $ref: '#/components/responses/ApprovalUnauthorized401'
        '404':
          $ref: '#/components/responses/ApprovalNotFound404'
        '429':
          $ref: '#/components/responses/RateLimitedErr429'
        '500':
          $ref: '#/components/responses/InternalErr500'
        '504':
          $ref: '#/components/responses/Timeout504'
      security:
      - apiKey: []
      summary: Check Token Approval
      tags:
      - Approval
      x-public-endpoint: true
  /limit_order_quote:
    post:
      description: Get a quote for a limit order according to the provided configuration.
      operationId: get_limit_order_quote
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LimitOrderQuoteRequest'
      responses:
        '200':
          $ref: '#/components/responses/LimitOrderQuoteSuccess200'
        '400':
