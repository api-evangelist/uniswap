components:
  parameters:
    bridgeTokenInChainIdParam:
      example: 1
      in: query
      name: tokenInChainId
      required: true
      schema:
        $ref: '#/components/schemas/ChainId'
    chainIdParam:
      in: query
      name: chainId
      required: false
      schema:
        $ref: '#/components/schemas/ChainId'
    cursorParam:
      in: query
      name: cursor
      required: false
      schema:
        type: string
    erc20EthEnabledHeader:
      description: Enable native ETH input support for UniswapX via ERC20-ETH (EIP-7914).
        When set to true and `tokenIn` is the native currency address (e.g. `0x0000000000000000000000000000000000000000`),
        the API may return UniswapX routes that spend native ETH for supported wallets.
      in: header
      name: x-erc20eth-enabled
      required: false
      schema:
        default: false
        type: boolean
    fillerParam:
      description: Filter by filler address.
      in: query
      name: filler
      required: false
      schema:
        $ref: '#/components/schemas/Address'
    limitParam:
      in: query
      name: limit
      required: false
      schema:
        type: number
    orderIdParam:
      description: A transaction hash for an order. `orderId` or `orderIds` must be
        provided, but not both.
      in: query
      name: orderId
      required: false
      schema:
        $ref: '#/components/schemas/orderId'
    orderIdsParam:
      description: A list of comma separated orderIds (transaction hashes). `orderId`
        or `orderIds` must be provided, but not both.
      in: query
      name: orderIds
      required: false
      schema:
        $ref: '#/components/schemas/OrderIds'
    orderStatusParam:
      description: Filter by order status.
      in: query
      name: orderStatus
      required: false
      schema:
        $ref: '#/components/schemas/OrderStatus'
    orderTypeParam:
      description: The UniswapX order type to retrieve.
      in: query
      name: orderType
      required: false
      schema:
        $ref: '#/components/schemas/OrderTypeQuery'
    permit2DisabledHeader:
      description: Disables the Permit2 approval flow. When set to `true`, `permitData`
        is returned as `null` and the header is forwarded to the routing layer for
        correct gas simulation against the Proxy Universal Router contract. When `false`
        or omitted, the standard Permit2 approval flow is used. This header is intended
        for integrators whose infrastructure uses a direct approval-then-swap pattern
        without Permit2.
      in: header
      name: x-permit2-disabled
      required: false
      schema:
        default: false
        type: boolean
    sortKeyParam:
      description: Order the query results by the sort key.
      in: query
      name: sortKey
      required: false
      schema:
        $ref: '#/components/schemas/SortKey'
    sortParam:
      description: 'Sort query. For example: `sort=gt(UNIX_TIMESTAMP)`, `sort=between(1675872827,
        1675872930)`, or `lt(1675872930)`.'
      in: query
      name: sort
      required: false
      schema:
        type: string
    swapperParam:
      description: Filter by swapper address.
      in: query
      name: swapper
      required: false
      schema:
        $ref: '#/components/schemas/Address'
    tokenInParam:
      example: '0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48'
      in: query
      name: tokenIn
      required: true
      schema:
        $ref: '#/components/schemas/Address'
    transactionHashesParam:
      description: On-chain transaction hashes. At least one of `txHashes` or `userOpHashes`
        must be provided.
      example:
      - '0xc286f0adc6a9d6d26d6114df251d9b09d8bfafb2e00af5953193f6af92e110db'
      explode: false
      in: query
      name: txHashes
      required: false
      schema:
        items:
          $ref: '#/components/schemas/TransactionHash'
        type: array
      style: form
    universalRouterVersionHeader:
      description: The version of the Universal Router to use for the swap journey.
        *MUST* be consistent throughout the API calls.
      in: header
      name: x-universal-router-version
      required: false
      schema:
        $ref: '#/components/schemas/UniversalRouterVersion'
    userOpHashesParam:
      description: ERC-4337 UserOperation hashes. At least one of `txHashes` or `userOpHashes`
        must be provided.
      example:
      - '0xd47b609961a02483c9516d1f326244357e7e0b1d91569ebb4d119dff17e47330'
      explode: false
      in: query
      name: userOpHashes
      required: false
      schema:
        items:
          $ref: '#/components/schemas/TransactionHash'
        type: array
      style: form
  responses:
